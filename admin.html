<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | UKM Hackathon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="text-white min-h-screen flex flex-col bg-[#0a192f]">

  <!-- LOGIN OVERLAY -->
  <div id="loginOverlay" class="fixed inset-0 bg-[#0a192f] z-[100] flex items-center justify-center p-6">
    <div class="glass-panel p-8 rounded-xl max-w-sm w-full">
      <h2 class="text-2xl font-tech font-bold mb-6 text-center">SYSTEM OVERRIDE</h2>
      <input type="password" id="adminPwd" 
        class="w-full neon-input rounded px-4 py-3 mb-4 text-center font-mono tracking-widest" 
        placeholder="PASSWORD">
      <button id="loginBtn" 
        class="w-full neon-btn py-3 rounded font-bold">
        AUTHENTICATE
      </button>
      <p class="text-xs text-center text-gray-500 mt-4">
        Hint: type "Daman"
      </p>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-64 glass-panel border-r border-[#00f5ff]/20 hidden md:flex flex-col">
      <div class="p-6">
        <a href="index.html" class="font-tech text-xl font-bold flex items-center gap-2">
          OVERSEER
        </a>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-grow p-8 overflow-y-auto">

      <div class="mb-8">
        <h1 class="text-3xl font-tech font-bold">DATABANKS</h1>
        <p class="text-gray-400 text-sm">
          Real-time telemetry and candidate tracking
        </p>
      </div>

      <!-- STATS -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="glass-panel p-6 rounded-xl border-l-4 border-l-[#00f5ff]">
          <h3 class="text-gray-400 text-sm mb-2">Total Candidates</h3>
          <p class="text-4xl font-bold" id="statTotal">0</p>
        </div>

        <div class="glass-panel p-6 rounded-xl border-l-4 border-l-purple-500">
          <h3 class="text-gray-400 text-sm mb-2">Formed Teams</h3>
          <p class="text-4xl font-bold" id="statTeams">0</p>
        </div>
      </div>

      <!-- TABLE -->
      <div class="glass-panel rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left text-sm">
            <thead class="bg-black/40 border-b border-[#00f5ff]/20">
              <tr>
                <th class="px-6 py-4">ID</th>
                <th class="px-6 py-4">Name</th>
                <th class="px-6 py-4">Role</th>
                <th class="px-6 py-4">Team Code</th>
                <th class="px-6 py-4">Action</th>
              </tr>
            </thead>
            <tbody id="tableBody" class="divide-y divide-white/10">
              <!-- Data Injected Here -->
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- LOGIN LOGIC -->
  <script>
    document.getElementById("loginBtn").addEventListener("click", () => {
      const pwd = document.getElementById("adminPwd").value;
      if (pwd === "Daman") {
        document.getElementById("loginOverlay").style.display = "none";
        loadRegistrations();
      } else {
        alert("Access Denied");
      }
    });
  </script>

  <!-- FIREBASE SCRIPT -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getFirestore, 
      collection, 
      getDocs, 
      deleteDoc, 
      doc 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDzI52EIIn9JE3ym8xQFztFdXkMoChGJVU",
      authDomain: "ukm-hackathon-admin.firebaseapp.com",
      projectId: "ukm-hackathon-admin",
      storageBucket: "ukm-hackathon-admin.firebasestorage.app",
      messagingSenderId: "138460236538",
      appId: "1:138460236538:web:8eadcf600f40ba06381743"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.loadRegistrations = async function () {
      const snapshot = await getDocs(collection(db, "registrations"));
      const tbody = document.getElementById("tableBody");

      tbody.innerHTML = "";

      let total = 0;
      const teams = new Set();

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        total++;

        if (data.teamCode) {
          teams.add(data.teamCode);
        }

        const row = document.createElement("tr");

        row.innerHTML = `
          <td class="px-6 py-4 text-xs font-mono">${docSnap.id}</td>
          <td class="px-6 py-4">
            <div class="font-bold">${data.name}</div>
            <div class="text-xs text-gray-400">${data.email}</div>
          </td>
          <td class="px-6 py-4">${data.role || "N/A"}</td>
          <td class="px-6 py-4">${data.teamCode || "SOLO"}</td>
          <td class="px-6 py-4">
            <button 
              onclick="deleteReg('${docSnap.id}')" 
              class="text-xs text-red-400 border border-red-500/30 px-3 py-1 rounded">
              Purge
            </button>
          </td>
        `;

        tbody.appendChild(row);
      });

      document.getElementById("statTotal").innerText = total;
      document.getElementById("statTeams").innerText = teams.size;
    };

    window.deleteReg = async function (id) {
      if (confirm("Purge entity from databanks?")) {
        await deleteDoc(doc(db, "registrations", id));
        loadRegistrations();
      }
    };
  </script>

</body>
</html>
