<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | UKM Hackathon 2026</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</head>

<body class="text-white min-h-screen flex flex-col relative bg-[#0a192f]">

  <main class="flex-grow pt-20 pb-20 px-6">
    <div class="max-w-3xl mx-auto">

      <h1 class="text-4xl font-bold mb-8 text-center">
        REGISTER FOR <span class="text-cyan-400">UKM HACKATHON</span>
      </h1>

      <form id="regForm" class="bg-black/40 p-8 rounded-xl space-y-6">

        <input type="text" name="name" required
          class="w-full p-3 rounded bg-black/50"
          placeholder="Full Name">

        <input type="text" name="matric" required
          class="w-full p-3 rounded bg-black/50"
          placeholder="Student ID">

        <input type="email" name="email" required
          class="w-full p-3 rounded bg-black/50"
          placeholder="Email Address">

        <select name="role" required
          class="w-full p-3 rounded bg-black/50">
          <option value="" disabled selected>Select Role</option>
          <option value="Frontend">Frontend</option>
          <option value="Backend">Backend</option>
          <option value="Fullstack">Fullstack</option>
          <option value="Design">Design</option>
          <option value="AI">AI/ML</option>
          <option value="Business">Business</option>
        </select>

        <div>
          <label><input type="radio" name="teamStatus" value="solo" checked> Solo</label>
          <label class="ml-4"><input type="radio" name="teamStatus" value="join"> Join Team</label>
          <label class="ml-4"><input type="radio" name="teamStatus" value="create"> Create Team</label>
        </div>

        <div id="teamCodeBlock" class="hidden">
          <input type="text" name="teamCode"
            class="w-full p-3 rounded bg-black/50 uppercase"
            placeholder="TEAM-XXXXX">
        </div>

        <button type="submit"
          class="w-full bg-cyan-500 py-3 rounded font-bold text-black">
          REGISTER
        </button>

      </form>
    </div>
  </main>

  <!-- SUCCESS MODAL -->
  <div id="successModal"
    class="fixed inset-0 bg-black/80 hidden items-center justify-center">

    <div class="bg-black p-8 rounded-xl text-center max-w-md w-full">
      <h2 class="text-2xl font-bold mb-4 text-cyan-400">
        REGISTRATION SUCCESS
      </h2>

      <p class="mb-4">Your Registration ID:</p>

      <div id="regIdDisplay"
        class="bg-black/50 p-4 rounded mb-4 font-mono text-xl text-cyan-400">
      </div>

      <button onclick="window.location.href='index.html'"
        class="bg-cyan-500 px-6 py-2 rounded text-black font-bold">
        RETURN
      </button>
    </div>
  </div>

  <!-- FIREBASE + EMAIL SCRIPT -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDzI52EIIn9JE3ym8xQFztFdXkMoChGJVU",
      authDomain: "ukm-hackathon-admin.firebaseapp.com",
      projectId: "ukm-hackathon-admin",
      storageBucket: "ukm-hackathon-admin.firebasestorage.app",
      messagingSenderId: "138460236538",
      appId: "1:138460236538:web:8eadcf600f40ba06381743"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    emailjs.init("NNbbXEmOQgO-ru2uS");

    const teamRadios = document.querySelectorAll('input[name="teamStatus"]');
    const teamCodeBlock = document.getElementById("teamCodeBlock");
    const teamCodeInput = document.querySelector('input[name="teamCode"]');

    function generateTeamCode() {
      return "TEAM-" + Math.random().toString(36).substring(2, 7).toUpperCase();
    }

    teamRadios.forEach(radio => {
      radio.addEventListener("change", (e) => {
        if (e.target.value === "join") {
          teamCodeBlock.classList.remove("hidden");
          teamCodeInput.readOnly = false;
          teamCodeInput.value = "";
        }
        else if (e.target.value === "create") {
          teamCodeBlock.classList.remove("hidden");
          teamCodeInput.readOnly = true;
          teamCodeInput.value = generateTeamCode();
        }
        else {
          teamCodeBlock.classList.add("hidden");
          teamCodeInput.value = "";
        }
      });
    });

    document.getElementById("regForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      if (data.teamStatus === "join" && !data.teamCode) {
        alert("Please enter a team code.");
        return;
      }

      try {
        // SAVE TO FIREBASE
        const docRef = await addDoc(collection(db, "registrations"), {
          name: data.name,
          matric: data.matric,
          email: data.email,
          role: data.role,
          teamStatus: data.teamStatus,
          teamCode: data.teamCode || null,
          createdAt: new Date()
        });

        // SEND EMAIL
        await emailjs.send(
          "service_s1bdjmp",
          "template_cv1g2op",
          {
            name: data.name,
            id: docRef.id,
            role: data.role,
            teamCode: data.teamCode || "SOLO",
            email: data.email
          }
        );

        // SHOW SUCCESS
        document.getElementById("regIdDisplay").innerText = docRef.id;
        document.getElementById("successModal").classList.remove("hidden");
        document.getElementById("successModal").classList.add("flex");

      } catch (error) {
        console.error("Error:", error);
        alert("Something went wrong. Check console.");
      }
    });

  </script>

</body>
</html>
