<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | UKM Hackathon 2026</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  
</head>

<body class="text-white min-h-screen flex flex-col relative bg-[#0a192f]">
  <div class="gradient-bg"></div>

  <!-- NAVBAR -->
  <nav class="fixed w-full z-50 glass-panel border-b-0 border-t-0 border-l-0 border-r-0">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="font-tech text-xl tracking-wider font-bold text-white flex items-center gap-2">
        <i data-lucide="hexagon" class="text-[#00f5ff]"></i>
        UKM<span class="text-[#00f5ff]">HACKATHON</span>
      </a>

      <a href="index.html" class="text-sm tracking-widest uppercase hover:text-[#00f5ff] flex items-center gap-2">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
      </a>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="flex-grow pt-32 pb-20 px-6">
    <div class="max-w-3xl mx-auto">

      <h1 class="text-4xl font-tech font-bold mb-2 text-center">
        SECURE YOUR <span class="text-[#00f5ff]">SPOT</span>
      </h1>

      <p class="text-center text-gray-400 mb-10 text-sm tracking-widest uppercase">
        System Registration Node Active
      </p>

      <form id="regForm" class="glass-panel p-8 rounded-xl shadow-2xl space-y-6">

        <!-- PERSONAL -->
        <div class="space-y-4">
          <h2 class="text-xl font-tech text-[#00f5ff] border-b border-[#00f5ff]/30 pb-2">
            Personal Data
          </h2>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" name="name" required
              class="w-full neon-input rounded px-4 py-3"
              placeholder="Full Name">

            <input type="text" name="matric" required
              class="w-full neon-input rounded px-4 py-3"
              placeholder="Student ID / Matric">
          </div>

          <input type="email" name="email" required
            class="w-full neon-input rounded px-4 py-3"
            placeholder="Email Address">
        </div>

        <!-- ROLE -->
        <div class="space-y-4 pt-4">
          <h2 class="text-xl font-tech text-[#00f5ff] border-b border-[#00f5ff]/30 pb-2">
            Technical Spec
          </h2>

          <select name="role" required
            class="w-full neon-input rounded px-4 py-3">
            <option value="" disabled selected>Select Role...</option>
            <option value="Frontend">Frontend Dev</option>
            <option value="Backend">Backend Dev</option>
            <option value="Fullstack">Fullstack Dev</option>
            <option value="Design">UI/UX Designer</option>
            <option value="AI">AI/ML Engineer</option>
            <option value="Business">Business/Product</option>
          </select>
        </div>

        <!-- TEAM -->
        <div class="space-y-4 pt-4">
          <h2 class="text-xl font-tech text-[#00f5ff] border-b border-[#00f5ff]/30 pb-2">
            Team Alignment
          </h2>

          <div class="flex gap-4 text-sm">
            <label><input type="radio" name="teamStatus" value="solo" checked> Solo</label>
            <label><input type="radio" name="teamStatus" value="join"> Join Team</label>
            <label><input type="radio" name="teamStatus" value="create"> Create Team</label>
          </div>

          <div id="teamCodeBlock" class="hidden">
            <input type="text" name="teamCode"
              class="w-full neon-input rounded px-4 py-3 uppercase"
              placeholder="TEAM-XXXXX">
          </div>
        </div>

        <button type="submit"
          class="w-full neon-btn py-4 rounded font-bold text-lg">
          REGISTER NOW
        </button>

      </form>
    </div>
  </main>

  <!-- SUCCESS MODAL -->
  <div id="successModal"
    class="fixed inset-0 bg-black/80 hidden items-center justify-center">

    <div class="glass-panel p-8 rounded-xl max-w-md w-full text-center">

      <h2 class="text-3xl font-tech font-bold mb-4">
        ACCESS GRANTED
      </h2>

      <p class="text-gray-400 mb-4">
        Registration successful.
      </p>

      <div id="regIdDisplay"
        class="bg-black/50 p-4 rounded mb-4 font-mono text-xl text-[#00f5ff]">
      </div>

      <button onclick="window.location.href='index.html'"
        class="neon-btn px-6 py-2 rounded w-full">
        RETURN
      </button>
    </div>
  </div>

  <!-- IMPORTANT: LOAD app.js FIRST -->
  <script src="app.js"></script>

  <script>
  document.addEventListener("DOMContentLoaded", () => {

  // 🔐 Initialize EmailJS
  emailjs.init("NNbbXEmOQgO-ru2uS");

  const teamRadios = document.querySelectorAll('input[name="teamStatus"]');
  const teamCodeBlock = document.getElementById("teamCodeBlock");
  const teamCodeInput = document.querySelector('input[name="teamCode"]');

  teamRadios.forEach(radio => {
    radio.addEventListener("change", (e) => {

      if (e.target.value === "join") {
        teamCodeBlock.classList.remove("hidden");
        teamCodeInput.readOnly = false;
        teamCodeInput.value = "";
      }

      else if (e.target.value === "create") {
        teamCodeBlock.classList.remove("hidden");
        teamCodeInput.readOnly = true;
        teamCodeInput.value = generateTeamCode();
      }

      else {
        teamCodeBlock.classList.add("hidden");
        teamCodeInput.value = "";
      }

    });
  });

  document.getElementById("regForm").addEventListener("submit", (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    if (data.teamStatus === "join" && !data.teamCode) {
      alert("Please enter a team code.");
      return;
    }

    const existing = getRegistrations();
    if (existing.find(r => r.email === data.email)) {
      alert("Email already registered.");
      return;
    }

    // ✅ Save once only
    const saved = saveRegistration(data);

    // 🚀 Send Email using YOUR real IDs
    emailjs.send("service_s1bdjmp", "template_cv1g2op", {
      name: data.name,
      id: saved.id,
      role: data.role,
      teamCode: data.teamCode || "SOLO",
      email: data.email
    })
    .then(() => {

      document.getElementById("regIdDisplay").innerText = saved.id;

      const modal = document.getElementById("successModal");
      modal.classList.remove("hidden");
      modal.classList.add("flex");

      console.log("Email sent successfully ✅");

    })
    .catch((error) => {
      console.error("Email failed ❌", error);
      alert("Registration saved, but email failed.");
    });

  });

});
  </script>

</body>
</html>
